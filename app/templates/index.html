{% extends "base.html" %}

{% block title %}Auto camera → WebSocket demo{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', path='css/index.css') }}">
{% endblock %}

{% block content %}

<!-- Фоновое размытое видео во весь экран -->
<video id="bg-video" autoplay playsinline muted></video>

<div class="camera-root app-content" role="application" aria-label="Камера приложение">
  <div class="camera-meta">
    <h3 style="margin:0">Авто: камера → сервер → TTS</h3>
    <div class="muted">Для корректной работы разрешите доступ к камере</div>
  </div>

  <!-- верхние 2/3 — реальное изображение камеры, центрировано -->
  <div class="camera-foreground" aria-hidden="false">
    <!-- foreground видео — это то, что сейчас использовалось как #video -->
    <video id="video" width="640" height="480" autoplay playsinline muted></video>
    <!-- холст для захвата кадров остаётся, скрыт -->
    <canvas id="canvas" width="640" height="480" style="display:none"></canvas>
  </div>

  <!-- нижняя 1/3 — большая контрастная кнопка -->
  <div class="camera-controls">
    <button id="start-button" type="button" aria-label="Начать" role="button">НАЧАТЬ</button>
  </div>

  <!-- вспомогательные элементы: голосовая кнопка и статус (скроются под кнопкой на маленьких экранах) -->
  <div style="display:none" aria-hidden="true">
    <button id="voice-btn" aria-pressed="false">🎤 Голос</button>
    <span id="voice-status" class="muted" style="margin-left:8px">Ожидание</span>
  </div>

  <h4 style="margin-top:6px; display:none">Лог (клиента):</h4>
  <div id="log" style="display:none"></div>
</div>

{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', path='js/index.js') }}" defer></script>
{% endblock %}
